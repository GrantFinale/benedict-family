<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Benedict Family</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ── Feature 2: @property for animated gradients ── */
        @property --aurora-color-1 {
            syntax: '<color>';
            inherits: false;
            initial-value: rgba(79, 70, 229, 0.03);
        }
        @property --aurora-color-2 {
            syntax: '<color>';
            inherits: false;
            initial-value: rgba(212, 168, 83, 0.04);
        }
        @property --aurora-color-3 {
            syntax: '<color>';
            inherits: false;
            initial-value: rgba(59, 130, 246, 0.03);
        }
        @property --hero-grad-1 {
            syntax: '<color>';
            inherits: false;
            initial-value: #d4a853;
        }
        @property --hero-grad-2 {
            syntax: '<color>';
            inherits: false;
            initial-value: #f0d68a;
        }
        @property --hero-grad-3 {
            syntax: '<color>';
            inherits: false;
            initial-value: #b8892e;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --gold: #d4a853;
            --gold-light: #f0d68a;
            --gold-dark: #b8892e;
            --cream: #faf6ef;
            --charcoal: #1a1a2e;
            --deep-blue: #0f0f23;
            --accent-blue: #4a90d9;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--deep-blue);
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* ── Feature 10: text-wrap balance ── */
        h1, h2, h3, h4, h5, h6, .card-title {
            text-wrap: balance;
        }

        /* ── Feature 3: Scroll Progress Indicator ── */
        .scroll-progress {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            z-index: 2000;
            background: transparent;
            pointer-events: none;
        }
        .scroll-progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--gold-dark), var(--gold), var(--gold-light));
            transition: width 0.1s linear;
        }

        /* ── Feature 6: Cursor Glow ── */
        .cursor-glow {
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(212, 168, 83, 0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 5;
            transform: translate(-50%, -50%);
            will-change: left, top;
            display: none;
        }

        /* ── Animated Background ── */
        #bg-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            width: 100dvw; height: 100dvh;
            z-index: 0;
        }

        .gradient-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            width: 100dvw; height: 100dvh;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(79, 70, 229, 0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(212, 168, 83, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(59, 130, 246, 0.08) 0%, transparent 50%);
            z-index: 1;
            pointer-events: none;
        }

        /* Feature 2: Aurora with @property animated colors */
        .aurora {
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background:
                conic-gradient(from 0deg at 50% 50%,
                    transparent 0deg,
                    var(--aurora-color-1) 60deg,
                    transparent 120deg,
                    var(--aurora-color-2) 180deg,
                    transparent 240deg,
                    var(--aurora-color-3) 300deg,
                    transparent 360deg);
            animation: aurora-rotate 30s linear infinite, aurora-colors 8s ease-in-out infinite alternate;
            z-index: 1;
            pointer-events: none;
        }

        @keyframes aurora-rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes aurora-colors {
            0% {
                --aurora-color-1: rgba(79, 70, 229, 0.03);
                --aurora-color-2: rgba(212, 168, 83, 0.04);
                --aurora-color-3: rgba(59, 130, 246, 0.03);
            }
            33% {
                --aurora-color-1: rgba(212, 168, 83, 0.05);
                --aurora-color-2: rgba(59, 130, 246, 0.04);
                --aurora-color-3: rgba(79, 70, 229, 0.04);
            }
            66% {
                --aurora-color-1: rgba(59, 130, 246, 0.04);
                --aurora-color-2: rgba(79, 70, 229, 0.05);
                --aurora-color-3: rgba(212, 168, 83, 0.04);
            }
            100% {
                --aurora-color-1: rgba(120, 80, 229, 0.04);
                --aurora-color-2: rgba(240, 190, 83, 0.05);
                --aurora-color-3: rgba(80, 150, 246, 0.04);
            }
        }

        /* ── Content Layer ── */
        .content {
            position: relative;
            z-index: 10;
        }

        /* ── Hero Section ── */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 5vh;
            text-align: center;
            padding-left: 2rem;
            padding-right: 2rem;
            position: relative;
        }

        .family-crest {
            width: clamp(280px, 40vw, 480px);
            margin-bottom: 2.5rem;
            position: relative;
        }

        .family-crest img {
            width: 100%;
            height: auto;
        }

        /* Canvas-based shine rendered in JS */
        .family-crest canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: auto;
            pointer-events: none;
            aspect-ratio: attr(width) / attr(height);
        }

        .hero .subtitle {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(0.9rem, 2vw, 1.2rem);
            font-weight: 400;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 3rem;
        }

        /* ── Dad of the Decade CTA ── */
        .dotd-link {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 1rem;
            padding: 1.2rem 3rem;
            background: linear-gradient(135deg, rgba(212, 168, 83, 0.15), rgba(212, 168, 83, 0.05));
            border: 1px solid rgba(212, 168, 83, 0.3);
            border-radius: 100px;
            text-decoration: none;
            color: var(--gold-light);
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            font-size: 1.1rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            overflow: hidden;
            cursor: pointer;
        }
        .dotd-link::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 100px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark), var(--gold-light), var(--gold));
            background-size: 300% 300%;
            animation: border-shimmer 4s ease-in-out infinite;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.5s;
        }
        .dotd-link::after {
            content: '';
            position: absolute;
            inset: 1px;
            background: var(--deep-blue);
            border-radius: 100px;
            z-index: -1;
        }
        .dotd-link:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 40px rgba(212, 168, 83, 0.2), 0 0 80px rgba(212, 168, 83, 0.1);
            color: #fff;
            border-color: var(--gold);
        }
        .dotd-link:hover::before { opacity: 1; }
        .dotd-link:hover .play-icon { transform: scale(1.15); }
        .dotd-link .play-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s;
        }
        .dotd-link .play-icon svg { width: 14px; height: 14px; margin-left: 2px; }
        .dotd-link .link-text { display: flex; flex-direction: column; align-items: flex-start; }
        .dotd-link .link-label { font-size: 0.65rem; letter-spacing: 0.2em; color: rgba(212, 168, 83, 0.6); font-weight: 500; }
        .dotd-link .link-title { font-size: 1.1rem; letter-spacing: 0.08em; }

        @keyframes border-shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* ── Floating particles behind hero ── */
        .hero-particles {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .hero-particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--gold);
            border-radius: 50%;
            opacity: 0;
            animation: particle-float linear infinite;
        }

        @keyframes particle-float {
            0% { opacity: 0; transform: translateY(100vh) scale(0); }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { opacity: 0; transform: translateY(-20vh) scale(1); }
        }

        /* ── Scroll Indicator ── */
        .scroll-indicator {
            position: absolute;
            bottom: 3rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            animation: fade-bounce 3s ease-in-out infinite;
        }

        .scroll-indicator .mouse {
            width: 24px;
            height: 38px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            position: relative;
        }

        .scroll-indicator .mouse::after {
            content: '';
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 3px;
            height: 8px;
            background: rgba(212, 168, 83, 0.6);
            border-radius: 2px;
            animation: scroll-dot 2s ease-in-out infinite;
        }

        @keyframes scroll-dot {
            0%, 100% { opacity: 1; transform: translateX(-50%) translateY(0); }
            50% { opacity: 0.3; transform: translateX(-50%) translateY(10px); }
        }

        @keyframes fade-bounce {
            0%, 100% { opacity: 0.5; transform: translateX(-50%) translateY(0); }
            50% { opacity: 1; transform: translateX(-50%) translateY(5px); }
        }

        /* ── Section Titles ── */
        .section-header { text-align: center; padding: 1.5rem 2rem 2rem; }
        .section-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 4vw, 3rem);
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: #fff;
        }
        .section-header p {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.9rem;
            letter-spacing: 0.1em;
        }
        @supports (animation-timeline: view()) {
            .section-header h2, .section-header p {
                animation: header-fade-in linear both;
                animation-timeline: view();
                animation-range: entry 0% entry 40%;
            }
        }

        @keyframes header-fade-in {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 1.5rem auto 0;
        }

        /* ── Video Grid ── */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(min(360px, 100%), 1fr));
            gap: 2rem;
            padding: 0 2rem 4rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .video-card {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1),
                        border-color 0.5s cubic-bezier(0.23, 1, 0.32, 1),
                        box-shadow 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            transform-style: preserve-3d;
            will-change: transform;
        }
        @supports (animation-timeline: view()) {
            .video-card {
                animation: card-scroll-in linear both;
                animation-timeline: view();
                animation-range: entry 0% entry 35%;
            }
        }
        .video-card:hover {
            border-color: rgba(212, 168, 83, 0.2);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3), 0 0 40px rgba(212, 168, 83, 0.05);
        }
        .video-card .thumb-wrapper {
            position: relative;
            aspect-ratio: 16/9;
            overflow: hidden;
            cursor: pointer;
        }
        .video-card .thumb-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .video-card .thumb-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 50%);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .video-card:hover .thumb-wrapper img { transform: scale(1.05); }
        .video-card:hover .thumb-overlay { opacity: 1; }
        .video-card:hover .big-play { transform: scale(1); }
        .video-card .card-info {
            padding: 1.2rem 1.5rem;
            display: flex;
            flex-wrap: wrap;
            align-items: flex-start;
            gap: 0.3rem;
            position: relative;
        }
        .video-card .card-title {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            line-height: 1.4;
            color: #fff;
            margin-bottom: 0.5rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex: 1 1 100%;
        }
        .video-card .card-date {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.35);
            flex: 1 1 auto;
        }
        .video-card:focus-visible {
            outline: 2px solid var(--gold);
            outline-offset: 2px;
            border-color: var(--gold);
        }

        /* Feature 1: scroll-driven card animation */
        @keyframes card-scroll-in {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .thumb-overlay .big-play {
            width: 64px;
            height: 64px;
            background: rgba(212, 168, 83, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: scale(0.8);
            transition: transform 0.3s;
            box-shadow: 0 0 30px rgba(212, 168, 83, 0.4);
        }

        .big-play svg {
            width: 24px;
            height: 24px;
            margin-left: 3px;
            fill: var(--deep-blue);
        }

        /* ── Feature 7: Share Button ── */
        .share-btn {
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.4);
            transition: all 0.3s;
            flex-shrink: 0;
            margin-left: auto;
            align-self: center;
        }
        .share-btn:hover { color: var(--gold); border-color: var(--gold); background: rgba(212, 168, 83, 0.1); }
        .share-btn svg { width: 14px; height: 14px; }

        /* Feature 7: Toast notification */
        .share-toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--gold);
            color: var(--deep-blue);
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 0.7rem 1.5rem;
            border-radius: 100px;
            z-index: 3000;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
        }
        .share-toast.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ── Feature 12: Skeleton Loading ── */
        .skeleton-thumb {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.05);
            z-index: 1;
        }
        .skeleton-thumb::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(255, 255, 255, 0.04) 40%,
                rgba(255, 255, 255, 0.08) 50%,
                rgba(255, 255, 255, 0.04) 60%,
                transparent 100%);
            background-size: 200% 100%;
            animation: shimmer 1.5s ease-in-out infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ── Video Modal ── */
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            cursor: pointer;
        }

        .modal-backdrop.active {
            display: flex;
        }

        .modal-content {
            width: 100%;
            max-width: 1100px;
            aspect-ratio: 16/9;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
            cursor: default;
            position: relative;
        }

        .modal-content iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Feature 8: PiP button */
        .pip-btn {
            position: absolute;
            bottom: 12px;
            right: 12px;
            width: 36px;
            height: 36px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: all 0.3s;
        }
        .pip-btn:hover { background: rgba(212, 168, 83, 0.8); border-color: var(--gold); }
        .pip-btn svg { width: 18px; height: 18px; }

        .modal-close {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            color: #fff;
            font-size: 1.4rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            z-index: 1001;
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(90deg);
        }

        /* ── Loading Spinner ── */
        .loading-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 3rem 2rem 5rem;
            gap: 1rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(212, 168, 83, 0.1);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 0.1em;
        }

        .loading-section.hidden { display: none; }

        .end-message {
            text-align: center;
            padding: 3rem 2rem 5rem;
            color: rgba(255, 255, 255, 0.25);
            font-size: 0.85rem;
            letter-spacing: 0.1em;
            display: none;
        }

        /* ── Footer ── */
        footer {
            text-align: center;
            padding: 3rem 2rem;
            color: rgba(255, 255, 255, 0.15);
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
        }

        /* ── Feature 4: Glassmorphism Floating Nav ── */
        .floating-nav {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            display: flex;
            gap: 0.25rem;
            padding: 0.5rem;
            background: rgba(15, 15, 35, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 168, 83, 0.15);
            border-radius: 100px;
            z-index: 900;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            pointer-events: none;
        }
        .floating-nav.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
            pointer-events: auto;
        }
        .floating-nav a {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            padding: 0.5rem 1.2rem;
            border-radius: 100px;
            transition: all 0.3s;
            white-space: nowrap;
        }
        .floating-nav a:hover { color: var(--gold-light); background: rgba(212, 168, 83, 0.1); }

        /* ── Feature 11: Back-to-Top Button ── */
        .back-to-top {
            position: fixed;
            bottom: 5.5rem;
            right: 2rem;
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border: none;
            border-radius: 50%;
            color: var(--deep-blue);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 900;
            opacity: 0;
            transform: translateY(20px) scale(0.8);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            pointer-events: none;
            box-shadow: 0 4px 20px rgba(212, 168, 83, 0.3);
        }
        .back-to-top.visible { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }

// ── Starfield Background with Feature 14: Parallax ──
(function() {
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let stars = [];
    const STAR_COUNT = 200;
    let scrollOffset = 0;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight || document.documentElement.clientHeight;
    }

    function initStars() {
        stars = [];
        for (let i = 0; i < STAR_COUNT; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                r: Math.random() * 1.5 + 0.3,
                alpha: Math.random() * 0.5 + 0.1,
                pulse: Math.random() * 0.02 + 0.005,
                phase: Math.random() * Math.PI * 2,
                depth: Math.random() * 0.5 + 0.5 // Feature 14: parallax depth
            });
        }
    }

    // Feature 14: Track scroll for parallax
    window.addEventListener('scroll', () => {
        scrollOffset = window.scrollY;
    }, { passive: true });

    let time = 0;
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        time += 0.01;

        stars.forEach(s => {
            const a = s.alpha + Math.sin(time * 2 + s.phase) * s.pulse * 10;
            // Feature 14: offset star positions by scroll * depth factor
            const parallaxY = (s.y - scrollOffset * s.depth * 0.05) % canvas.height;
            const drawY = parallaxY < 0 ? parallaxY + canvas.height : parallaxY;
            ctx.beginPath();
            ctx.arc(s.x, drawY, s.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(212, 190, 140, ${Math.max(0, a)})`;
            ctx.fill();
        });

        // Occasional shooting star
        if (Math.random() < 0.003) {
            const sx = Math.random() * canvas.width;
            const sy = Math.random() * canvas.height * 0.5;
            ctx.beginPath();
            ctx.moveTo(sx, sy);
            ctx.lineTo(sx + 80, sy + 30);
            ctx.strokeStyle = 'rgba(212, 168, 83, 0.4)';
            ctx.lineWidth = 1.5;
            ctx.stroke();
        }

        requestAnimationFrame(draw);
    }

    window.addEventListener('resize', () => { resize(); initStars(); });
    resize();
    initStars();
    draw();
})();

// ── Logo Shine Effect ──
(function() {
    const img = document.querySelector('.family-crest img');
    const canvas = document.getElementById('shine-canvas');
    const ctx = canvas.getContext('2d');

    img.addEventListener('load', () => {
        const rect = img.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        canvas.style.width = rect.width + 'px';
        canvas.style.height = rect.height + 'px';
        ctx.scale(dpr, dpr);

        const drawW = rect.width;
        const drawH = rect.height;

        let shineX = -0.4;
        let sweeping = false;
        let idleTimer = 0;
        const IDLE_FRAMES = 300;
        const SWEEP_SPEED = 0.02;

        function drawShine() {
            ctx.clearRect(0, 0, drawW, drawH);

            if (!sweeping) {
                idleTimer++;
                if (idleTimer >= IDLE_FRAMES) {
                    sweeping = true;
                    shineX = -0.4;
                    idleTimer = 0;
                }
                requestAnimationFrame(drawShine);
                return;
            }

            const cx = shineX * (drawW + drawH * 0.6);
            const bandWidth = drawW * 0.22;

            ctx.save();
            ctx.translate(cx, 0);
            ctx.rotate(0.35);

            const grad = ctx.createLinearGradient(-bandWidth, 0, bandWidth, 0);
            grad.addColorStop(0, 'rgba(255, 255, 255, 0)');
            grad.addColorStop(0.25, 'rgba(255, 248, 210, 0.2)');
            grad.addColorStop(0.45, 'rgba(255, 255, 240, 0.5)');
            grad.addColorStop(0.5, 'rgba(255, 255, 255, 0.7)');
            grad.addColorStop(0.55, 'rgba(255, 255, 240, 0.5)');
            grad.addColorStop(0.75, 'rgba(255, 248, 210, 0.2)');
            grad.addColorStop(1, 'rgba(255, 255, 255, 0)');

            ctx.fillStyle = grad;
            ctx.fillRect(-bandWidth, -drawH, bandWidth * 2, drawH * 3);
            ctx.restore();

            ctx.globalCompositeOperation = 'destination-in';
            ctx.drawImage(img, 0, 0, drawW, drawH);
            ctx.globalCompositeOperation = 'source-over';

            shineX += SWEEP_SPEED;
            if (shineX > 1.5) {
                sweeping = false;
            }

            requestAnimationFrame(drawShine);
        }

        drawShine();
    });

    if (img.complete) img.dispatchEvent(new Event('load'));
})();

// ── Feature 7: Share function ──
function shareVideo(videoId, title) {
    const url = `https://www.youtube.com/watch?v=${videoId}`;
    if (navigator.share) {
        navigator.share({ title: title, url: url }).catch(() => {});
    } else {
        navigator.clipboard.writeText(url).then(() => {
            showToast('Link copied!');
        }).catch(() => {
            // Fallback for older browsers
            const ta = document.createElement('textarea');
            ta.value = url;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            showToast('Link copied!');
        });
    }
}

// ── Feature 13: Keyboard Navigation ──
(function() {
    document.addEventListener('keydown', (e) => {
        const modal = document.getElementById('modal');
        if (modal.classList.contains('active')) return; // Don't navigate cards when modal open

        const cards = Array.from(document.querySelectorAll('.video-card'));
        if (!cards.length) return;

        const focused = document.activeElement;
        const currentIndex = cards.indexOf(focused);

        if (['ArrowRight', 'ArrowDown', 'ArrowLeft', 'ArrowUp'].includes(e.key)) {
            e.preventDefault();
            let nextIndex;
            if (currentIndex === -1) {
                nextIndex = 0;
            } else if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                nextIndex = Math.min(currentIndex + 1, cards.length - 1);
            } else {
                nextIndex = Math.max(currentIndex - 1, 0);
            }
            cards[nextIndex].focus();
            cards[nextIndex].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        if (e.key === 'Enter' && currentIndex !== -1) {
            const videoId = cards[currentIndex].dataset.videoId;
            if (videoId) openModal(videoId);
        }
    });
})();

function openModal(videoId) {
    // On mobile/touch, open YouTube directly — embeds are unreliable
    if (isTouchDevice) {
        window.open('https://www.youtube.com/watch?v=' + videoId, '_blank');
        return;
    }

    const modal = document.getElementById('modal');
    const content = document.getElementById('modal-content');
    content.innerHTML = `<iframe id="modal-iframe" src="https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0&modestbranding=1"
                          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                          allowfullscreen></iframe>`;
    modal.classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeModal() {
    const modal = document.getElementById('modal');
    document.getElementById('modal-content').innerHTML = '';
    modal.classList.remove('active');
    document.body.style.overflow = '';
}

document.getElementById('modal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeModal();
});
document.getElementById('modal-close').addEventListener('click', closeModal);
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

// ── Infinite Scroll ──
const observer = new IntersectionObserver((entries) => {
    if (entries[0].isIntersecting && !isLoading && !allLoaded) {
        isLoading = true;
        setTimeout(() => renderNextBatch(), 600);
    }
}, { rootMargin: '200px' });

observer.observe(document.getElementById('loading'));

// ── Init ──
fetchVideos();
</script>

</body>
</html>
